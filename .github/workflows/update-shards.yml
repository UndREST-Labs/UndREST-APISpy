name: Update Extension Shards

# Triggered automatically when UndREST-SpecQL publishes new shards,
# or manually to force a refresh.
#
# To add shards for a new API pack, trigger this workflow manually and supply
# the pack_id, pack_name and platform inputs.  Alternatively, add a dedicated
# workflow that calls prepare_data.py with --merge --pack-id <id>.
on:
  repository_dispatch:
    types: [speql-shards-updated]

  workflow_dispatch:
    inputs:
      speql_run_id:
        description: 'UndREST-SpecQL workflow run ID (optional — leave blank to use latest release)'
        required: false
      pack_id:
        description: 'Pack identifier written into the manifest (default: azure-rest-api-specs)'
        required: false
        default: 'azure-rest-api-specs'
      pack_name:
        description: 'Human-readable pack name (default: Azure REST API Specs)'
        required: false
        default: 'Azure REST API Specs'
      platform:
        description: 'Platform identifier, e.g. azure, aws, gcp (default: azure)'
        required: false
        default: 'azure'
      merge:
        description: 'Merge into existing manifest instead of replacing it (true/false)'
        required: false
        default: 'false'

jobs:
  update-shards:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout UndREST-APISpy
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest shards from UndREST-SpecQL release
        run: |
          mkdir -p inventory
          gh release download shards-latest \
            --repo UndREST-Labs/UndREST-SpecQL \
            --pattern "api-index-sharded-*.zip" \
            --dir inventory/ \
            --clobber
          # Extract the zip so prepare_data.py finds inventory/shards/
          ZIP=$(ls inventory/api-index-sharded-*.zip | head -1)
          unzip -o "$ZIP" -d inventory/
        env:
          GH_TOKEN: ${{ secrets.SPEQL_READ_TOKEN }}

      - name: Prepare extension shard data
        run: |
          PACK_ID="${{ github.event.inputs.pack_id || 'azure-rest-api-specs' }}"
          PACK_NAME="${{ github.event.inputs.pack_name || 'Azure REST API Specs' }}"
          PLATFORM="${{ github.event.inputs.platform || 'azure' }}"
          MERGE_FLAG=""
          if [ "${{ github.event.inputs.merge }}" = "true" ]; then
            MERGE_FLAG="--merge"
          fi
          python3 scripts/prepare_data.py \
            --source-dir inventory/ \
            --out extension/data/ \
            --pack-id "$PACK_ID" \
            --pack-name "$PACK_NAME" \
            --platform "$PLATFORM" \
            $MERGE_FLAG

      - name: Commit updated shard data
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add extension/data/
          if git diff --cached --quiet; then
            echo "No shard data changes to commit."
          else
            git commit -m "chore: update extension shard data from UndREST-SpecQL [skip ci]"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
